<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathFinder | AI Career Guide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>PathFinder <span>AI</span></h1>
            <p>Your future, mapped by intelligence.</p>
        </header>

        <main id="chat-window">
            <div class="message ai">
                Hello! I'm your AI career coach. What interests you, or what skills do you have?
            </div>
        </main>

        <footer class="input-area">
            <input type="text" id="user-input" placeholder="Type your career query here..." autocomplete="off">
            <button id="send-btn">Send</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
